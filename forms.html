<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim – Nilay Kuru</title>
    <link rel="stylesheet" href="style/hafta3.css">
</head>
<body>

    <a href="index.html" class="fixed-back">← Ana Sayfaya Dön</a>

    <div class="sayfa-baslik">
        <h2>Detaylı İletişim Formu</h2>
        <p>Benimle iletişime geçmek için aşağıdaki formu doldurabilirsiniz.</p>
    </div>

    <div class="contact-container">

        <div class="basari-mesaj" id="basariMesaj">
            ✅ Formunuz başarıyla gönderildi! En kısa sürede size dönüş yapacağım.
        </div>

        <form id="iletisimForm" onsubmit="formuGonder(event)" onreset="temizle()">

            <div class="form-grup">
                <label for="adSoyad">Ad Soyad:</label>
                <input type="text" id="adSoyad" name="adSoyad"
                       placeholder="Örn: Nilay Kuru">
            </div>

            <div class="form-grup">
                <label for="eposta">E-posta Adresi:</label>
                <input type="email" id="eposta" name="eposta"
                       placeholder="ornek@mail.com">
            </div>

            <div class="form-grup">
                <label for="sifre">Başvuru Takip Şifresi:</label>
                <input type="password" id="sifre" name="sifre"
                       placeholder="Şifrenizi girin">
            </div>

            <hr class="ayrac">

            <div class="form-grup">
                <label>İletişim Tercihi:</label>
                <div class="secim-kutusu">
                    <label class="secim-satir">
                        <input type="radio" name="iletisimTercihi" value="eposta" checked>
                        Bana e-posta ile ulaşın
                    </label>
                    <label class="secim-satir">
                        <input type="radio" name="iletisimTercihi" value="telefon">
                        Bana telefonla ulaşın
                    </label>
                </div>
            </div>

            <div class="form-grup">
                <label>İlgi Alanları / Yetenekler:</label>
                <div class="secim-kutusu">
                    <label class="secim-satir">
                        <input type="checkbox" name="yetenek" value="HTML">
                        HTML
                    </label>
                    <label class="secim-satir">
                        <input type="checkbox" name="yetenek" value="CSS">
                        CSS
                    </label>
                    <label class="secim-satir">
                        <input type="checkbox" name="yetenek" value="Algoritma">
                        Algoritma
                    </label>
                </div>
            </div>

            <div class="form-grup">
                <label for="konu">Konu:</label>
                <select id="konu" name="konu">
                    <option value="">Lütfen bir konu seçin...</option>
                    <option value="is-teklifi">İş Teklifi</option>
                    <option value="soru">Soru</option>
                    <option value="geri-bildirim">Geri Bildirim</option>
                    <option value="isbirligi">İşbirliği</option>
                    <option value="diger">Diğer</option>
                </select>
            </div>

            <div class="form-grup">
                <label for="dosya">Özgeçmiş (CV) veya Fotoğraf Yükle:</label>
                <input type="file" id="dosya" name="dosya"
                       accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
            </div>

            <div class="form-grup">
                <label for="mesaj">Mesajınız:</label>
                <textarea id="mesaj" name="mesaj"
                          placeholder="Detaylı mesajınızı buraya yazabilirsiniz..."></textarea>
            </div>

            <hr class="ayrac">

            <div class="btn-grup">
                <button type="submit">Gönder</button>
                <button type="reset">Temizle</button>
            </div>

        </form>
    </div>

    <footer>
        <p>© 2026 Nilay Kuru | Web Programlama Dersi</p>
    </footer>

    <script>
        function formuGonder(event) {
            event.preventDefault();

            var ad    = document.getElementById('adSoyad').value.trim();
            var ep    = document.getElementById('eposta').value.trim();
            var konu  = document.getElementById('konu').value;
            var mesaj = document.getElementById('mesaj').value.trim();

            if (!ad || !ep || !konu || !mesaj) {
                alert('⚠️ Lütfen Ad Soyad, E-posta, Konu ve Mesaj alanlarını doldurun.');
                return;
            }

            var basari = document.getElementById('basariMesaj');
            basari.style.display = 'block';
            basari.scrollIntoView({ behavior: 'smooth', block: 'center' });

            document.getElementById('iletisimForm').reset();
        }

        function temizle() {
            document.getElementById('basariMesaj').style.display = 'none';
        }
    </script>

</body>
</html>
